<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>取込内容確認</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #f6f7fb; color: #1f2937; }
    main { max-width: 1100px; margin: 20px auto 40px; padding: 24px; }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(15,23,42,.08); padding: 24px; }
    h1, h2 { margin-top: 0; }
    .form-grid { display: grid; gap: 12px 16px; }
    .meta { display: grid; grid-template-columns: 180px 1fr; gap: 12px 16px; }
    .label { color: #6b7280; }
    .value { font-weight: 600; word-break: break-word; }
    .section { margin-top: 28px; }
    .table-wrap { overflow-x: auto; margin-top: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #e5e7eb; padding: 10px 8px; text-align: left; vertical-align: top; }
    th { background: #f9fafb; }
    .actions { margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap; }
    .primary { background: #111827; color: #fff; border: 0; border-radius: 999px; padding: 12px 20px; cursor: pointer; }
    .secondary { display: inline-block; border-radius: 999px; padding: 12px 20px; text-decoration: none; border: 1px solid #d1d5db; color: #111827; }
    .note { color: #6b7280; }
    .tag { display: inline-block; padding: 4px 10px; border-radius: 999px; background: #eef2ff; color: #4338ca; font-size: 12px; }
    .error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; padding: 12px 16px; border-radius: 12px; margin: 16px 0 0; }
    .error-details { margin: 12px 0 0; padding-left: 18px; color: #7f1d1d; }
    .error-details li { margin: 4px 0; }
    .field-input, .field-textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: #fff;
      color: #111827;
      padding: 10px 12px;
      font: inherit;
    }
    .field-textarea { min-height: 88px; resize: vertical; }
    .readonly-note { margin-top: 4px; font-size: 12px; color: #6b7280; }
    .fallback-note {
      margin: 0 0 16px;
      padding: 12px 16px;
      border-radius: 12px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      color: #92400e;
    }
    .ingredient-card {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
      margin-top: 12px;
      background: #fcfcfd;
    }
    .ingredient-grid {
      display: grid;
      grid-template-columns: 80px 2fr 1fr 120px;
      gap: 12px;
      align-items: start;
    }
    .ingredient-grid .field-group { display: grid; gap: 6px; }
    .field-label { font-size: 12px; color: #6b7280; font-weight: 600; }
    @media (max-width: 720px) {
      main { margin: 0; padding: 12px; }
      .card { padding: 16px; border-radius: 14px; }
      .meta { grid-template-columns: 1fr; }
      .actions { flex-direction: column; }
      .primary, .secondary { width: 100%; text-align: center; box-sizing: border-box; }
      .ingredient-grid { grid-template-columns: 1fr; }
    }
  </style>
  <link rel="stylesheet" th:href="@{/css/kampo-theme.css}" />
</head>
<body>
<div th:replace="~{kampo/fragments :: pageHeader('抽出内容の確認・編集', '抽出結果を確認し、必要に応じて修正してから登録してください。', ${activeTab})}"></div>
<main>
  <div class="card" th:object="${draft}">
    <div class="error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <ul class="error-details" th:if="${errorDetails}">
      <li th:each="detail : ${errorDetails}" th:text="${detail}"></li>
    </ul>
    <div class="fallback-note" th:if="*{efficacySplitFallback}">
      効能又は効果の分割に失敗したため、全文を「前段」に読み込んでいます。必要に応じて「摘要」を手動で入力してください。
    </div>

    <form method="post" th:action="@{/kampo/import/save}" th:object="${draft}">
      <div class="section">
        <h2>基本情報</h2>
        <div class="meta form-grid">
          <div class="label">元ファイル名</div>
          <div>
            <input class="field-input" type="text" th:field="*{sourceFileName}" />
          </div>
          <div class="label">文書番号</div>
          <div>
            <input class="field-input" type="text" th:field="*{sourceDocumentNo}" />
          </div>
          <div class="label">識別コード</div>
          <div>
            <input class="field-input" type="text" th:field="*{identificationCode}" />
          </div>
          <div class="label">販売名</div>
          <div>
            <input class="field-input" type="text" th:field="*{salesName}" />
          </div>
          <div class="label">読み方</div>
          <div>
            <input class="field-input" type="text" th:field="*{reading}" placeholder="例: つむらあんちゅうさん" />
          </div>
        </div>
      </div>

      <div class="section">
        <h2>効能又は効果</h2>
        <div class="tag">前段</div>
        <textarea class="field-textarea" th:field="*{efficacyConditionText}"></textarea>
        <div class="tag" style="margin-top: 12px;">摘要</div>
        <textarea class="field-textarea" th:field="*{efficacyIndicationText}"></textarea>
      </div>

      <div class="section">
        <h2>用法及び用量</h2>
        <div class="tag">1日量</div>
        <input class="field-input" type="number" step="0.001" th:field="*{dosageDailyAmount}" />
        <div class="tag" style="margin-top: 12px;">用法</div>
        <textarea class="field-textarea" th:field="*{dosageInstructionsText}"></textarea>
      </div>

      <div class="section">
        <h2>有効成分</h2>
        <p class="note">必要なら名称や配合量を修正してください。表示順はそのまま保持されます。</p>
        <div class="ingredient-card" th:each="ingredient, stat : *{ingredients}">
          <div class="ingredient-grid">
            <div class="field-group">
              <div class="field-label">順序</div>
              <input class="field-input" type="number" th:field="*{ingredients[__${stat.index}__].sortOrder}" readonly />
            </div>
            <div class="field-group">
              <div class="field-label">有効成分名</div>
              <input class="field-input" type="text" th:field="*{ingredients[__${stat.index}__].ingredientName}" />
            </div>
            <div class="field-group">
              <div class="field-label">配合量</div>
              <input class="field-input" type="number" step="0.001" th:field="*{ingredients[__${stat.index}__].amountValue}" />
            </div>
            <div class="field-group">
              <div class="field-label">単位</div>
              <input class="field-input" type="text" th:field="*{ingredients[__${stat.index}__].amountUnit}" />
            </div>
          </div>
          <div class="readonly-note" th:text="'原文: ' + ${ingredient.rawAmountText}"></div>
        </div>
      </div>

      <div class="actions">
        <button class="primary" type="submit">この内容で登録する</button>
        <a class="secondary" th:href="@{/kampo/import}">別のPDFを読み込む</a>
      </div>
    </form>
  </div>
</main>
</body>
</html>
