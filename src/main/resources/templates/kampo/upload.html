<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>漢方PDF取込</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #f6f7fb; color: #1f2937; }
    main { max-width: 860px; margin: 20px auto 40px; padding: 24px; }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(15,23,42,.08); padding: 24px; }
    h1 { margin-top: 0; }
    .note { color: #6b7280; }
    .error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; }
    .field { margin: 16px 0; }
    label { display: block; font-weight: 600; margin-bottom: 8px; }
    input[type="file"] { display: block; }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    button, .secondary { background: #111827; color: #fff; border: 0; border-radius: 999px; padding: 12px 20px; cursor: pointer; text-decoration: none; display: inline-block; }
    .secondary { background: #fff; color: #111827; border: 1px solid #d1d5db; }
    button:hover { opacity: .92; }
    @media (max-width: 720px) {
      main { margin: 0; padding: 12px; }
      .card { padding: 16px; border-radius: 14px; }
      .actions { flex-direction: column; align-items: stretch; }
      button, .secondary { width: 100%; text-align: center; box-sizing: border-box; }
      input[type="file"] { width: 100%; }
    }
  </style>
  <link rel="stylesheet" th:href="@{/css/kampo-theme.css}" />
</head>
<body>
<div th:replace="~{kampo/fragments :: pageHeader('漢方PDF取込', 'PDFをアップロードすると、販売名・識別コード・成分・効能・用法を抽出して確認画面に表示します。', ${activeTab})}"></div>
<main>
  <div class="card">
    <div class="error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <form method="post" th:action="@{/kampo/import/preview}" enctype="multipart/form-data">
      <div class="field">
        <label for="file">PDFファイル</label>
        <input id="file" name="file" type="file" accept="application/pdf" required />
      </div>
      <div class="actions">
        <button type="submit">抽出して確認する</button>
      </div>
    </form>
  </div>
</main>
</body>
</html>
